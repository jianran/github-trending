# Spring Application
spring.application.name=github-trending-bot

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Discord Bot Configuration
discord.bot.token=${DISCORD_BOT_TOKEN:}
discord.bot.summary.channel.id=${DISCORD_SUMMARY_CHANNEL_ID:}
discord.bot.dm.user.ids=${DISCORD_DM_USER_IDS:}

# llamacpp Server Configuration
llamacpp.server.url=${LLAMACPP_SERVER_URL:http://localhost:8080}
llamacpp.server.model=${LLAMACPP_MODEL:llama2}
llamacpp.api.endpoint=/completion

# GitHub Trending Configuration
# GitHub Search API endpoint for trending-like repos
# {date} is replaced with today's date (YYYY-MM-DD) at runtime
github.trending.endpoint=https://api.github.com/search/repositories
github.trending.query=pushed:>={date} stars:>5000
github.trending.sort=stars
github.trending.order=desc
github.trending.period=${GITHUB_TRENDING_PERIOD:daily}
github.trending.top=${GITHUB_TRENDING_TOP:10}

# Summary Configuration
summary.schedule.cron=${SUMMARY_SCHEDULE_CRON:0 * * * * *}
summary.prompt.template=${SUMMARY_PROMPT_TEMPLATE:}

# Logging
logging.level.com.githubtrending=DEBUG
logging.level.org.springframework.ai=DEBUG
